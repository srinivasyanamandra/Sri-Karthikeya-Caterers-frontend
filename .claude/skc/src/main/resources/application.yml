spring:
  application:
    name: sri-karthikeya-caterers-backend
  
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: false

  task:
    execution:
      pool:
        core-size: 2
        max-size: 8
        queue-capacity: 200
      thread-name-prefix: async-email-

server:
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

# Application-specific configuration
admin:
  emails:
    - info@srikarthikeyacaterers.in
  passwords:
    - ${ADMIN_PASSWORD:changeme}

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-bytes-long-for-hs256}
  expiration: 86400000  # 24 hours in milliseconds

review:
  link:
    default-expires-days: 14
    base-url: ${REVIEW_BASE_URL:http://localhost:3000}

campaign:
  throttle:
    per-minute: 120
  default-batch-size: 50

logging:
  level:
    root: INFO
    syncqubits.ai.skc: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
