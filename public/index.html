<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#143a26" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="Sri Karthikeya Caterers — authentic taste, premium experience. Pure-vegetarian catering for weddings, corporate events and special occasions in Hyderabad, serving since 2009." />
    <meta name="keywords" content="vegetarian catering, pure veg catering, wedding catering, corporate catering, Hyderabad caterers, Indian vegetarian food" />
    <meta name="author" content="Sri Karthikeya Caterers" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.srikarthikeyacaterers.in" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Sri Karthikeya Caterers — Authentic Taste, Premium Experience" />
    <meta property="og:description" content="Pure-vegetarian catering for weddings, corporate events and special occasions. Serving Hyderabad since 2009." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.srikarthikeyacaterers.in" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sri Karthikeya Caterers — Authentic Taste, Premium Experience" />
    <meta name="twitter:description" content="Pure-vegetarian catering, serving Hyderabad since 2009." />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Mobile App Meta Tags -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sri Karthikeya Caterers" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Resource hints — start TCP/TLS handshakes during HTML parse,
         not after CSS resolves. Saves ~200ms on first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="dns-prefetch" href="https://imgs.search.brave.com">
    <link rel="dns-prefetch" href="https://m.media-amazon.com">

    <!-- Preload the hero image so it begins downloading parallel to the
         JS/CSS bundle, not after. fetchpriority=high tells the browser
         this is the LCP candidate. -->
    <link rel="preload" as="image" href="%PUBLIC_URL%/best.png" fetchpriority="high">

    <!-- Google Fonts: Fraunces (display serif, variable) + Inter (body) + Kaushan Script (entry) -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Inter:wght@300;400;500;600;700;800&family=Kaushan+Script&display=swap" rel="stylesheet">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Sri Karthikeya Caterers",
      "description": "Pure-vegetarian catering — authentic taste, premium experience. Serving since 2009.",
      "servesCuisine": "Vegetarian",
      "foundingDate": "2009",
      "founder": { "@type": "Person", "name": "Y. R. S. Gurumurthy" },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Hyderabad",
        "addressRegion": "Telangana",
        "postalCode": "500001",
        "addressCountry": "IN"
      },
      "telephone": "+918125820110",
      "email": "info@srikarthikeyacaterers.in",
      "priceRange": "₹₹",
      "openingHours": "Mo-Su 09:00-21:00"
    }
    </script>

    <title>Sri Karthikeya Caterers — Authentic Taste, Premium Experience | Hyderabad</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
